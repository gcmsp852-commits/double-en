<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QR Twin Reader</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --ink: #f3f4f6;
      --muted: #9ca3af;
      --primary: #2563eb;
      --ok: #16a34a;
      --warn: #f59e0b;
      --danger: #dc2626;
      --sys: #f97316;
      --app: #9333ea;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #0b1220;
      border-bottom: 1px solid #374151;
      font-weight: 700;
      text-align: center;
    }

    .camera-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video, #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #overlay { pointer-events: none; }

    footer {
      border-top: 1px solid #374151;
      background: #0b1220;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .status {
      color: var(--warn);
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 10px 16px;
      background: #1f2937;
      color: var(--ink);
      cursor: pointer;
      font-weight: 600;
    }

    button.primary { background: var(--primary); border-color: var(--primary); }
    button.sys { background: var(--sys); border-color: var(--sys); }
    button.app { background: var(--app); border-color: var(--app); }

    .overlay-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .overlay-screen.show { display: flex; }

    .dialog {
      width: min(92vw, 520px);
      background: var(--panel);
      border: 1px solid #4b5563;
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .dialog h2 {
      margin: 0;
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
    }

    .badge.sys { background: rgba(249,115,22,0.18); color: #fdba74; border: 1px solid rgba(249,115,22,0.35); }
    .badge.app { background: rgba(147,51,234,0.18); color: #d8b4fe; border: 1px solid rgba(147,51,234,0.35); }

    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .card .label { color: var(--muted); font-size: 12px; }
    .card .value { word-break: break-all; font-family: Consolas, monospace; font-size: 14px; }

    .dialog input[type="password"] {
      width: 100%;
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 10px;
      background: #0b1220;
      color: var(--ink);
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .actions button { min-width: 110px; }
  </style>
</head>
<body>
  <header id="headerText">QR Twin Reader</header>

  <main class="camera-wrap">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="work" hidden></canvas>
  </main>

  <footer>
    <div id="statusText" class="status">モードを選択してください</div>
    <div id="modeButtons" class="mode-buttons">
      <button id="normalModeBtn" class="primary">通常モード</button>
      <button id="doubleModeBtn" class="app">二重暗号化モード</button>
    </div>
  </footer>

  <div id="passwordScreen" class="overlay-screen">
    <div class="dialog">
      <h2>QRコードは暗号化されています</h2>
      <div class="card">
        <div class="label">第1QRデータ</div>
        <div id="pwQr1Text" class="value">-</div>
      </div>
      <div>第2QR復号用のパスワードを入力してください。</div>
      <input id="passwordInput" type="password" placeholder="Password" />
      <div class="actions">
        <button id="pwCancelBtn">キャンセル</button>
        <button id="pwResumeBtn" class="primary">スキャン再開</button>
      </div>
    </div>
  </div>

  <div id="sysEncScreen" class="overlay-screen">
    <div class="dialog">
      <span class="badge sys">システム暗号化</span>
      <h2>QRコードがシステム暗号化されています</h2>
      <div class="card">
        <div class="label">第1QRデータ</div>
        <div id="sysQr1Text" class="value">-</div>
      </div>
      <div>スキャン再開で第2QRを復号します。</div>
      <div class="actions">
        <button id="sysCancelBtn">キャンセル</button>
        <button id="sysResumeBtn" class="sys">スキャン再開</button>
      </div>
    </div>
  </div>

  <div id="doubleEncScreen" class="overlay-screen">
    <div class="dialog">
      <span class="badge app">アプリ暗号化</span>
      <h2>QRコードがアプリ暗号化されています</h2>
      <div class="card">
        <div class="label">第1QRデータ（第2QRのパスワード）</div>
        <div id="doubleQr1Text" class="value">-</div>
      </div>
      <div>スキャン再開で第2QRを探索します。</div>
      <div class="actions">
        <button id="doubleCancelBtn">キャンセル</button>
        <button id="doubleResumeBtn" class="app">スキャン再開</button>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="overlay-screen">
    <div class="dialog">
      <h2>読取結果</h2>
      <div class="card">
        <div class="label">第1QR</div>
        <div id="resultText1" class="value">-</div>
        <div id="resultMgmt1" class="label">管理部: -</div>
      </div>
      <div class="card">
        <div class="label">第2QR</div>
        <div id="resultText2" class="value">-</div>
        <div id="resultMgmt2" class="label">管理部: -</div>
      </div>
      <div class="actions">
        <button id="resultBackBtn" class="primary">モード選択へ戻る</button>
      </div>
    </div>
  </div>

  <script src="jsQR.js"></script>
  <script>
    (function () {
      const SCAN_INTERVAL_MS = 110;
      const MASK_BYTES_FALLBACK = 5000;

      const video = document.getElementById("camera");
      const overlay = document.getElementById("overlay");
      const overlayCtx = overlay.getContext("2d");
      const work = document.getElementById("work");
      const workCtx = work.getContext("2d", { willReadFrequently: true });

      const headerText = document.getElementById("headerText");
      const statusText = document.getElementById("statusText");
      const modeButtons = document.getElementById("modeButtons");

      const passwordScreen = document.getElementById("passwordScreen");
      const sysEncScreen = document.getElementById("sysEncScreen");
      const doubleEncScreen = document.getElementById("doubleEncScreen");
      const resultScreen = document.getElementById("resultScreen");

      const pwQr1Text = document.getElementById("pwQr1Text");
      const sysQr1Text = document.getElementById("sysQr1Text");
      const doubleQr1Text = document.getElementById("doubleQr1Text");

      const passwordInput = document.getElementById("passwordInput");

      const resultText1 = document.getElementById("resultText1");
      const resultText2 = document.getElementById("resultText2");
      const resultMgmt1 = document.getElementById("resultMgmt1");
      const resultMgmt2 = document.getElementById("resultMgmt2");

      let scanMode = "normal";
      let scanStage = 0; // 0: idle, 1: scan first, 2: waiting overlay, 3: scan second
      let firstQR = null;
      let secondQR = null;

      let stream = null;
      let isScanning = false;
      let isProcessing = false;
      let lastScanTime = 0;
      let rafId = 0;

      let stage3UseSysEncDecode = false;
      let appMask = null;

      function setStatus(text) {
        statusText.textContent = text;
      }

      function toBits16(mgmtCode) {
        if (typeof mgmtCode !== "number" || Number.isNaN(mgmtCode)) {
          return "0000000000000000";
        }
        return (mgmtCode >>> 0).toString(2).padStart(16, "0").slice(-16);
      }

      function isSameData(bits) { return bits[5] === "1"; }
      function isSysEnc(bits) { return bits[6] === "1"; }
      function isAppEnc(bits) { return bits[7] === "1"; }

      function hideAllOverlays() {
        [passwordScreen, sysEncScreen, doubleEncScreen, resultScreen].forEach((el) => {
          el.classList.remove("show");
        });
      }

      function openOverlay(el) {
        hideAllOverlays();
        el.classList.add("show");
      }

      function drawLocation(location, color) {
        if (!location) return;
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
        overlayCtx.strokeStyle = color;
        overlayCtx.lineWidth = 4;
        overlayCtx.beginPath();
        overlayCtx.moveTo(location.topLeftCorner.x, location.topLeftCorner.y);
        overlayCtx.lineTo(location.topRightCorner.x, location.topRightCorner.y);
        overlayCtx.lineTo(location.bottomRightCorner.x, location.bottomRightCorner.y);
        overlayCtx.lineTo(location.bottomLeftCorner.x, location.bottomLeftCorner.y);
        overlayCtx.closePath();
        overlayCtx.stroke();
      }

      function clearLocationBox() {
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      }

      async function sha256BytesAsync(msgBytes) {
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBytes);
        return new Uint8Array(hashBuffer);
      }

      async function deriveEncryptionMaskBytesAsync(password, neededBytes) {
        if (!password) return null;
        const pwBytes = new TextEncoder().encode(password);
        let currentHash = await sha256BytesAsync(pwBytes);
        const out = new Uint8Array(neededBytes);
        let offset = 0;

        while (offset < neededBytes) {
          const take = Math.min(currentHash.length, neededBytes - offset);
          out.set(currentHash.subarray(0, take), offset);
          offset += take;
          if (offset < neededBytes) {
            currentHash = await sha256BytesAsync(currentHash);
          }
        }
        return out;
      }

      function stopLoop() {
        isScanning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = 0;
        }
      }

      function resetSessionState() {
        stopLoop();
        isProcessing = false;
        scanStage = 0;
        firstQR = null;
        secondQR = null;
        stage3UseSysEncDecode = false;
        appMask = null;
        clearLocationBox();
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        video.srcObject = null;
      }

      async function startCameraAndScan() {
        resetSessionState();
        hideAllOverlays();

        try {
          setStatus("カメラを起動中...");
          const constraints = {
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          };

          stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          video.setAttribute("playsinline", "true");

          await new Promise((resolve) => {
            video.onloadedmetadata = resolve;
            setTimeout(resolve, 1800);
          });

          await video.play();

          overlay.width = video.videoWidth || 1280;
          overlay.height = video.videoHeight || 720;
          work.width = overlay.width;
          work.height = overlay.height;

          scanStage = 1;
          isScanning = true;
          lastScanTime = 0;

          if (scanMode === "normal") {
            headerText.textContent = "QR Twin Reader (通常モード)";
            setStatus("第1QRを探索中...");
          } else {
            headerText.textContent = "QR Twin Reader (二重暗号化モード)";
            setStatus("第1QR（システム暗号化）を探索中...");
          }

          rafId = requestAnimationFrame(scanLoop);
        } catch (err) {
          console.error(err);
          setStatus("カメラ起動エラー: " + (err && err.message ? err.message : err));
          stopCamera();
          modeButtons.style.display = "flex";
        }
      }

      function pauseForOverlay(overlayEl) {
        stopLoop();
        scanStage = 2;
        openOverlay(overlayEl);
      }

      function resumeStage3(statusMessage) {
        hideAllOverlays();
        scanStage = 3;
        isScanning = true;
        lastScanTime = 0;
        setStatus(statusMessage);
        rafId = requestAnimationFrame(scanLoop);
      }

      function showResult() {
        stopLoop();
        setStatus("読取完了");

        const firstBits = toBits16(firstQR && firstQR.managementCode);
        const secondBits = toBits16(secondQR && secondQR.managementCode);

        resultText1.textContent = firstQR ? firstQR.text : "-";
        resultText2.textContent = secondQR ? secondQR.text : "-";
        resultMgmt1.textContent = "管理部: " + firstBits;
        resultMgmt2.textContent = "管理部: " + secondBits;

        openOverlay(resultScreen);
      }

      function handleStage1(res) {
        const bits = toBits16(res.managementCode);

        if (scanMode === "double") {
          // 二重暗号化モードの初回は system bit=1 のQRのみ受理する。
          if (!isSysEnc(bits)) {
            return;
          }
        }

        firstQR = {
          text: res.data,
          managementCode: res.managementCode
        };

        if (scanMode === "normal" && isSameData(bits)) {
          secondQR = {
            text: res.data,
            managementCode: res.managementCode
          };
          showResult();
          return;
        }

        if (scanMode === "normal") {
          if (isSysEnc(bits)) {
            sysQr1Text.textContent = firstQR.text;
            pauseForOverlay(sysEncScreen);
            return;
          }

          if (isAppEnc(bits)) {
            pwQr1Text.textContent = firstQR.text;
            passwordInput.value = "";
            pauseForOverlay(passwordScreen);
            return;
          }

          stage3UseSysEncDecode = false;
          appMask = null;
          resumeStage3("第2QRを探索中...");
          return;
        }

        // double mode
        doubleQr1Text.textContent = firstQR.text;
        pauseForOverlay(doubleEncScreen);
      }

      function handleStage3(res) {
        if (firstQR && res.data === firstQR.text && res.managementCode === firstQR.managementCode) {
          return;
        }

        secondQR = {
          text: res.data,
          managementCode: res.managementCode
        };
        showResult();
      }

      function scanLoop() {
        if (!isScanning) return;

        const now = Date.now();
        if (isProcessing || now - lastScanTime < SCAN_INTERVAL_MS || video.readyState < 2) {
          rafId = requestAnimationFrame(scanLoop);
          return;
        }

        isProcessing = true;
        lastScanTime = now;

        try {
          if (work.width !== video.videoWidth || work.height !== video.videoHeight) {
            work.width = video.videoWidth;
            work.height = video.videoHeight;
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
          }

          workCtx.drawImage(video, 0, 0, work.width, work.height);
          const image = workCtx.getImageData(0, 0, work.width, work.height);

          const opts = { inversionAttempts: "attemptBoth" };

          if (scanMode === "double" && scanStage === 1) {
            opts.sysEncDecode = true;
          }

          if (scanStage === 3) {
            if (stage3UseSysEncDecode) {
              opts.sysEncDecode = true;
            }
            if (appMask) {
              opts.appEncMask = Array.from(appMask);
            }
          }

          const res = jsQR(image.data, image.width, image.height, opts);
          if (!res || !res.data) {
            clearLocationBox();
            return;
          }

          drawLocation(res.location, scanStage === 1 ? "#16a34a" : "#0ea5e9");

          if (scanStage === 1) {
            handleStage1(res);
          } else if (scanStage === 3) {
            handleStage3(res);
          }
        } catch (err) {
          console.error("scan error", err);
        } finally {
          isProcessing = false;
        }

        if (isScanning) {
          rafId = requestAnimationFrame(scanLoop);
        }
      }

      async function onPasswordResume() {
        const pw = passwordInput.value.trim();
        if (!pw) {
          alert("パスワードを入力してください。");
          return;
        }

        setStatus("パスワード処理中...");
        appMask = await deriveEncryptionMaskBytesAsync(pw, MASK_BYTES_FALLBACK);
        stage3UseSysEncDecode = false;
        resumeStage3("第2QR（アプリ暗号化）を探索中...");
      }

      function onSysResume() {
        appMask = null;
        stage3UseSysEncDecode = true;
        resumeStage3("第2QR（システム暗号化）を探索中...");
      }

      async function onDoubleResume() {
        if (!firstQR || !firstQR.text) {
          return;
        }

        setStatus("第1QRデータから復号マスク生成中...");
        appMask = await deriveEncryptionMaskBytesAsync(firstQR.text, MASK_BYTES_FALLBACK);
        stage3UseSysEncDecode = false;
        resumeStage3("第2QR（アプリ暗号化）を探索中...");
      }

      function backToModeSelect() {
        hideAllOverlays();
        resetSessionState();
        stopCamera();
        headerText.textContent = "QR Twin Reader";
        setStatus("モードを選択してください");
        modeButtons.style.display = "flex";
      }

      document.getElementById("normalModeBtn").addEventListener("click", async () => {
        scanMode = "normal";
        modeButtons.style.display = "none";
        await startCameraAndScan();
      });

      document.getElementById("doubleModeBtn").addEventListener("click", async () => {
        scanMode = "double";
        modeButtons.style.display = "none";
        await startCameraAndScan();
      });

      document.getElementById("pwResumeBtn").addEventListener("click", onPasswordResume);
      document.getElementById("pwCancelBtn").addEventListener("click", backToModeSelect);
      document.getElementById("sysResumeBtn").addEventListener("click", onSysResume);
      document.getElementById("sysCancelBtn").addEventListener("click", backToModeSelect);
      document.getElementById("doubleResumeBtn").addEventListener("click", onDoubleResume);
      document.getElementById("doubleCancelBtn").addEventListener("click", backToModeSelect);
      document.getElementById("resultBackBtn").addEventListener("click", backToModeSelect);

      window.addEventListener("beforeunload", () => {
        stopCamera();
      });
    })();
  </script>
</body>
</html>
